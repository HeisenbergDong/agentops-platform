states:
  - idle
  - job_starting
  - cleaning_old_runtime
  - loading_rules
  - generating_prompt
  - prompt_ready
  - sending_to_worker
  - worker_opening_trae
  - prompt_sent
  - waiting_trae
  - awaiting_continue
  - collecting_trace
  - trace_validating
  - trace_missing_abort
  - test_chain_exception
  - screenshot_capturing
  - product_reviewing
  - browser_accepting
  - github_submitting
  - github_failed_abort
  - feishu_preparing
  - feishu_writing
  - feishu_failed_abort
  - round_completed
  - project_completed
  - stopped
  - manual_required

hard_gates:
  github_requires: trace_validating_passed
  feishu_requires: github_submitting_passed

completion_trace_rules:
  - waiting_trae_to_collecting_trace_must_persist_completion_observation
  - copy_latest_reply_failure_after_completion_must_not_enqueue_click_continue
  - formal_completed_without_trace_goes_to_trace_missing_abort
  - test_completed_without_trace_may_continue_only_with_labeled_test_chain_exception

abort_states:
  - trace_missing_abort
  - github_failed_abort
  - feishu_failed_abort
  - manual_required
